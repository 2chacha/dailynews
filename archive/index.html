<style>
 :root{ --paper:#f5f4ef; --ink:#1d1c1a; --muted:#726d64; --faint:#948e83; --line:#e5e1d7;
   --rule:#d7d2c6; --accent:#0f5f57; --accent-soft:rgba(15,95,87,.10);
   --serif:"Nanum Myeongjo","AppleMyungjo",Batang,Georgia,serif;
   --sans:-apple-system,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,sans-serif; }
 @media(prefers-color-scheme:dark){ :root{ --paper:#141311; --ink:#e9e6df; --muted:#a49e92;
   --faint:#867e71; --line:#2a2822; --rule:#332f28; --accent:#5bb9ac; --accent-soft:rgba(91,185,172,.14); } }
 *{box-sizing:border-box}
 body{ font-family:var(--sans); max-width:600px; margin:0 auto; padding:0 20px 60px;
   line-height:1.6; color:var(--ink); background:var(--paper); }
 .head{ text-align:center; padding:46px 0 18px; border-bottom:3px double var(--rule); }
 .kicker{ margin:0; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); font-weight:600; }
 h1{ margin:.22em 0 .5em; font-family:var(--serif); font-weight:800; font-size:2rem; }
 .back{ display:inline-block; font-size:.85rem; text-decoration:none; color:var(--accent); }
 .back:hover{ text-decoration:underline; }
 ul{ list-style:none; margin:22px 0 0; padding:0; }
 li{ border-top:1px solid var(--line); }
 li a{ display:block; padding:14px 4px; text-decoration:none; color:var(--ink);
   font-variant-numeric:tabular-nums; transition:background .15s,color .15s; }
 li a:hover{ color:var(--accent); background:var(--accent-soft); }
 .d{ font-family:var(--serif); font-size:1.05rem; font-weight:700; }
 .empty{ color:var(--faint); padding:14px 4px; }
</style></head>
